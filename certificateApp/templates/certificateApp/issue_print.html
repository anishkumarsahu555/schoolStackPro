<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            width: {{ page_width_mm|default:'210' }}mm;
            height: {{ page_height_mm|default:'297' }}mm;
            padding: {{ margin_top|default:'12' }}mm {{ margin_right|default:'12' }}mm {{ margin_bottom|default:'12' }}mm {{ margin_left|default:'12' }}mm;
            overflow: hidden;
        }

        body,
        html {
            box-sizing: border-box;
            width: {{ page_width_mm|default:'210' }}mm;
            height: {{ page_height_mm|default:'297' }}mm;
            min-height: {{ page_height_mm|default:'297' }}mm;
            max-height: {{ page_height_mm|default:'297' }}mm;
            overflow: hidden;
            print-color-adjust: exact;
            -webkit-print-color-adjust: exact;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        @media print {
            html,
            body {
                background: transparent;
                width: {{ page_width_mm|default:'210' }}mm;
                height: {{ page_height_mm|default:'297' }}mm;
            }
        }
    </style>
</head>
<body onload="window.print()">
    {% include 'certificateApp/partials/certificate_document.html' %}
</body>
</html>
