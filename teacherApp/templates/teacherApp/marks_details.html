{% extends 'teacherApp/index.html' %}
{% load static %}

{% block title %}
    <title>Student Marks Details</title>
{% endblock %}

{% block css %}
    <style>
        #MarksDetailTable_length {
            left: 20px;
            position: absolute;
        }

        #MarksDetailTable_filter {
            float: right;
        }

        .dt-buttons {
            position: absolute;
            left: 174px;
        }

        input[type=search] {
            width: 100px !important;
        }
    </style>
{% endblock %}

{% block body %}
    <div class="ui left aligned basic grid">
        <div class="sixteen wide column">
            <div class="ui pointing secondary menu">
                <div style="cursor: pointer;" class="item active" data-tab="user">Student Marks Details</div>
            </div>

            <div class="ui tab active" data-tab="user">
                <div class="ui segment">
                    <h4 class="ui horizontal left aligned divider header">
                        <i class="left align icon"></i>
                        By Class & Exam
                    </h4>

                    <form class="ui tiny form">
                        <div class="three fields">
                            <div class="field required">
                                <label>Class-Section</label>
                                <select class="ui search dropdown" id="standard" onchange="getExamList()">
                                    <option value="">Search By Class Name</option>
                                </select>
                            </div>
                            <div class="field required">
                                <label>Exam</label>
                                <select class="ui search dropdown" id="exam">
                                    <option value="">Search By Exam</option>
                                </select>
                            </div>
                            <div class="field" style="padding-top: 2.2em;">
                                <div class="ui mini buttons">
                                    <button type="button" class="ui green button" onclick="searchData()">
                                        <i class="icon search"></i>
                                        Search
                                    </button>
                                    <div class="or"></div>
                                    <button type="button" class="ui red button" onclick="clearFilters()">
                                        <i class="icon times circle"></i>
                                        Clear
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="row" style="padding-left: 5px; padding-right: 5px; display: none;" id="MarksTableDiv">
                    <div class="wide">
                        <table class="ui unstackable tiny sortable celled very nowrap very compact table"
                               id="MarksDetailTable"
                               style="margin-top: 5px; width: 100%">
                            <thead id="marksHead"></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block js %}
    <script>
        let marksTable = null;

        $(document).ready(function () {
            getStandardList();
        });

        function getStandardList() {
            $.ajax({
                type: 'get',
                url: "{% url 'managementAppCachedAPI:get_cached_standard_list_api' %}",
                success: function (response) {
                    if (!response.success || !Array.isArray(response.data)) {
                        addErrorNotification(response.message || 'Unable to load classes');
                        return;
                    }
                    $('#standard').html('<option value="">Search By Class Name</option>');
                    for (let j = 0; j < response.data.length; j++) {
                        $('#standard').append('<option value="' + response.data[j]['ID'] + '">' + response.data[j]['Name'] + '</option>');
                    }
                    $('#standard').dropdown('refresh');
                },
                error: function () {
                    addErrorNotification();
                }
            });
        }

        function getExamList() {
            const standard = $('#standard').val();
            $('#exam').html('<option value="">Search By Exam</option>');
            if (!standard) {
                $('#exam').dropdown('refresh');
                return;
            }

            $.ajax({
                type: 'get',
                url: "{% url 'managementAppAPI:get_exam_list_by_class_api' %}",
                data: {standard: standard},
                success: function (response) {
                    if (!response.success || !Array.isArray(response.data)) {
                        addErrorNotification(response.message || 'Unable to load exams');
                        return;
                    }
                    for (let j = 0; j < response.data.length; j++) {
                        $('#exam').append('<option value="' + response.data[j]['ID'] + '">' + response.data[j]['Name'] + '</option>');
                    }
                    $('#exam').dropdown('refresh');
                },
                error: function () {
                    addErrorNotification();
                }
            });
        }

        function buildColumns(subjects) {
            const baseColumns = [
                {title: 'Photo', data: 0},
                {title: 'Name', data: 1},
                {title: 'Roll', data: 2}
            ];
            for (let i = 0; i < subjects.length; i++) {
                baseColumns.push({title: subjects[i].Name, data: i + 3});
            }
            return baseColumns;
        }

        function buildHead(columns) {
            let head = '<tr>';
            for (let i = 0; i < columns.length; i++) {
                head += '<th>' + columns[i].title + '</th>';
            }
            head += '</tr>';
            $('#marksHead').html(head);
        }

        function searchData() {
            const standard = $('#standard').val();
            const exam = $('#exam').val();
            if (!standard || !exam) {
                requiredFieldError();
                $('#MarksTableDiv').hide();
                return;
            }

            $.ajax({
                type: 'get',
                url: "{% url 'managementAppAPI:get_subjects_to_class_assign_list_with_given_class_api' %}",
                data: {standard: standard},
                success: function (response) {
                    if (!response.success || !Array.isArray(response.data)) {
                        addErrorNotification(response.message || 'Unable to load subjects');
                        return;
                    }

                    const columns = buildColumns(response.data);
                    buildHead(columns);
                    $('#MarksTableDiv').show();

                    if (marksTable) {
                        marksTable.destroy();
                        $('#MarksDetailTable tbody').empty();
                    }

                    marksTable = $('#MarksDetailTable').DataTable({
                        dom: 'Blfrtip',
                        scrollY: '350px',
                        scrollX: true,
                        stateSave: true,
                        buttons: [{
                            extend: 'excel'
                        }],
                        aaSorting: [[2, 'asc']],
                        lengthMenu: [[50, 100, 200, -1], [50, 100, 200, 'All']],
                        pageLength: 50,
                        processing: true,
                        serverSide: true,
                        ajax: "{% url 'managementAppAPI:StudentMarksDetailsByClassAndExamJson' %}?standard=" + standard + "&exam=" + exam,
                        columns: columns
                    });
                },
                error: function () {
                    addErrorNotification();
                }
            });
        }

        function clearFilters() {
            $('#standard').dropdown('clear');
            $('#exam').dropdown('clear');
            $('#MarksTableDiv').hide();
            if (marksTable) {
                marksTable.clear().draw();
            }
        }
    </script>
{% endblock %}
