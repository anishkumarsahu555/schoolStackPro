<div class="ui basic modal custom" id="inventoryDeleteModal">
    <div class="ui icon header">
        <i class="trash alternate icon red"></i>
        <span id="inventoryDeleteTitle">Record Details will be Deleted</span>
    </div>
    <div class="content">
        <p id="inventoryDeleteMessage" style="text-align: center">The record will be deleted, are you sure to delete this record?</p>
    </div>
    <div class="actions">
        <div class="ui red basic cancel inverted button">
            <i class="remove icon"></i>
            No
        </div>
        <input type="hidden" id="inventoryDeleteID">
        <div class="ui green ok inverted button" onclick="confirmInventoryDeleteAction()">
            <i class="checkmark icon"></i>
            Yes
        </div>
    </div>
</div>
<script>
window.inventoryDeleteState = {callback: null};
function showInventoryDeleteModal(id, title, message, callback){
    $('#inventoryDeleteID').val(id);
    $('#inventoryDeleteTitle').text(title || 'Delete Record');
    $('#inventoryDeleteMessage').text(message || 'Are you sure you want to delete this record?');
    window.inventoryDeleteState.callback = callback;
    $('#inventoryDeleteModal').modal('show');
}
function confirmInventoryDeleteAction(){
    const id = $('#inventoryDeleteID').val();
    if (typeof window.inventoryDeleteState.callback === 'function') {
        window.inventoryDeleteState.callback(id);
    }
}
function initInventoryDatePicker(selector){
    $(selector).calendar({
        monthFirst: false,
        type: 'date',
        formatter: {
            date: function(date){
                if(!date) return '';
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return date.getFullYear() + '-' + month + '-' + day;
            }
        }
    });
}
</script>
