{% extends 'managementApp/index.html' %}
{% load static %}

{% block title %}
    <title>Edit Parent</title>
{% endblock %}

{% block body %}
    <div class="ui left aligned basic grid">
        <div class="sixteen wide column">
            <div class="ui pointing secondary menu">
                <div class="item active">Edit Parent Details</div>
                <div style="margin-left: auto;">
                    <a href="{% url 'managementApp:parent_detail' parent.id %}" class="ui mini button">
                        <i class="arrow left icon"></i>
                        Back to Parent Detail
                    </a>
                </div>
            </div>

            <form class="ui form segment" method="post">
                {% csrf_token %}

                <h4 class="ui dividing header">Father Details</h4>
                <div class="three fields">
                    <div class="field">
                        <label>Father Name</label>
                        <input type="text" name="fatherName" value="{{ parent.fatherName|default:'' }}" placeholder="Father Name">
                    </div>
                    <div class="field">
                        <label>Father Phone</label>
                        <input type="text" name="fatherPhone" value="{{ parent.fatherPhone|default:'' }}" placeholder="Father Phone">
                    </div>
                    <div class="field">
                        <label>Father Email</label>
                        <input type="email" name="fatherEmail" value="{{ parent.fatherEmail|default:'' }}" placeholder="Father Email">
                    </div>
                </div>
                <div class="two fields">
                    <div class="field">
                        <label>Father Occupation</label>
                        <input type="text" name="fatherOccupation" value="{{ parent.fatherOccupation|default:'' }}" placeholder="Father Occupation">
                    </div>
                    <div class="field">
                        <label>Father Address</label>
                        <textarea name="fatherAddress" rows="2" placeholder="Father Address">{{ parent.fatherAddress|default:'' }}</textarea>
                    </div>
                </div>

                <h4 class="ui dividing header">Mother Details</h4>
                <div class="three fields">
                    <div class="field">
                        <label>Mother Name</label>
                        <input type="text" name="motherName" value="{{ parent.motherName|default:'' }}" placeholder="Mother Name">
                    </div>
                    <div class="field">
                        <label>Mother Phone</label>
                        <input type="text" name="motherPhone" value="{{ parent.motherPhone|default:'' }}" placeholder="Mother Phone">
                    </div>
                    <div class="field">
                        <label>Mother Email</label>
                        <input type="email" name="motherEmail" value="{{ parent.motherEmail|default:'' }}" placeholder="Mother Email">
                    </div>
                </div>
                <div class="two fields">
                    <div class="field">
                        <label>Mother Occupation</label>
                        <input type="text" name="motherOccupation" value="{{ parent.motherOccupation|default:'' }}" placeholder="Mother Occupation">
                    </div>
                    <div class="field">
                        <label>Mother Address</label>
                        <textarea name="motherAddress" rows="2" placeholder="Mother Address">{{ parent.motherAddress|default:'' }}</textarea>
                    </div>
                </div>

                <h4 class="ui dividing header">Guardian and Family Details</h4>
                <div class="three fields">
                    <div class="field">
                        <label>Guardian Name</label>
                        <input type="text" name="guardianName" value="{{ parent.guardianName|default:'' }}" placeholder="Guardian Name">
                    </div>
                    <div class="field">
                        <label>Guardian Phone</label>
                        <input type="text" name="guardianPhone" value="{{ parent.guardianPhone|default:'' }}" placeholder="Guardian Phone">
                    </div>
                    <div class="field">
                        <label>Guardian Occupation</label>
                        <input type="text" name="guardianOccupation" value="{{ parent.guardianOccupation|default:'' }}" placeholder="Guardian Occupation">
                    </div>
                </div>

                <div class="five fields">
                    <div class="field">
                        <label>Family Type</label>
                        <select class="ui dropdown" name="familyType">
                            <option value="">Select Family Type</option>
                            <option value="Single Parent" {% if parent.familyType == 'Single Parent' %}selected{% endif %}>Single Parent</option>
                            <option value="Nuclear Family" {% if parent.familyType == 'Nuclear Family' %}selected{% endif %}>Nuclear Family</option>
                            <option value="Joint Family" {% if parent.familyType == 'Joint Family' %}selected{% endif %}>Joint Family</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Total Family Members</label>
                        <input type="number" name="totalFamilyMembers" min="1" value="{{ parent.totalFamilyMembers|default:'' }}" placeholder="Total Family Members">
                    </div>
                    <div class="field">
                        <label>Annual Income</label>
                        <input type="number" name="annualIncome" min="0" step="0.01" value="{{ parent.annualIncome|default:'' }}" placeholder="Annual Income">
                    </div>
                    <div class="field">
                        <label>Primary Phone</label>
                        <input type="text" name="primaryPhone" value="{{ parent.phoneNumber|default:'' }}" placeholder="Primary Phone">
                    </div>
                    <div class="field">
                        <label>Primary Email</label>
                        <input type="email" name="primaryEmail" value="{{ parent.email|default:'' }}" placeholder="Primary Email">
                    </div>
                </div>

                <div class="ui divider"></div>
                <button class="ui blue button" type="submit">
                    <i class="save icon"></i>
                    Save Changes
                </button>
                <a href="{% url 'managementApp:parent_detail' parent.id %}" class="ui button">Cancel</a>
            </form>
        </div>
    </div>
{% endblock %}
