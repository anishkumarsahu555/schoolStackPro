<div class="ui basic modal custom" id="hostelDeleteModal">
    <div class="ui icon header">
        <i class="trash alternate icon red"></i>
        <span id="hostelDeleteTitle">Hostel Details will be Deleted</span>
    </div>
    <div class="content">
        <p id="hostelDeleteMessage" style="text-align: center">The selected hostel record will be deleted, are you sure to delete this record?</p>
    </div>
    <div class="actions">
        <div class="ui red basic cancel inverted button">
            <i class="remove icon"></i>
            No
        </div>
        <input type="hidden" id="hostelDeleteID">
        <div class="ui green ok inverted button" onclick="confirmHostelDeleteAction()">
            <i class="checkmark icon"></i>
            Yes
        </div>
    </div>
</div>
<script>
window.hostelDeleteState = window.hostelDeleteState || {callback: null};
function showHostelDeleteModal(id, title, message, callback){
    $('#hostelDeleteID').val(id);
    $('#hostelDeleteTitle').text(title || 'Hostel Details will be Deleted');
    $('#hostelDeleteMessage').text(message || 'The selected hostel record will be deleted, are you sure to delete this record?');
    window.hostelDeleteState.callback = callback;
    $('#hostelDeleteModal').modal('show');
}
function confirmHostelDeleteAction(){
    const id = $('#hostelDeleteID').val();
    if (typeof window.hostelDeleteState.callback === 'function') {
        window.hostelDeleteState.callback(id);
    }
}
function initHostelCalendars(){
    $('.hostel-date-calendar').calendar({
        monthFirst: false,
        type: 'date',
        formatter: {
            date: function(date){
                if(!date) return '';
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return date.getFullYear() + '-' + month + '-' + day;
            }
        }
    });
}
$(function(){
    initHostelCalendars();
});
</script>
