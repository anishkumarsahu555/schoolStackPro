{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,initial-scale=1.0,maximum-scale=5.0,minimum-scale=1.0">

    <title>Login</title>

    <link rel="icon" href="{% static 'sw/images/favicon.ico' %}">
    <link rel="apple-touch-icon" href="{% static 'sw/images/apple-touch-icon.png' %}">

    <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Semantic UI (toast support) -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.8.8/semantic.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.8.8/semantic.min.js"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Roboto Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
          rel="stylesheet">

    <style>
        /* Page background */
        body {
           background: linear-gradient(135deg, #e3eafdff, #E8F5E9);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Roboto', sans-serif;
            justify-content: center;
            align-items: center;
        }

        /* Main card */
        .login-card {
            width: 780px;
            display: flex;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        /* Left section */
        .left-panel {
            width: 50%;
            padding: 30px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(14px);
        }

        .left-panel img {
            width: 110px;
            height: 110px;
            margin-top: 20px;
        }

        .left-panel .title {
            margin-top: 18px;
            font-size: 28px;
            font-weight: 600;
            color: #1a73e8;
            letter-spacing: 1px;
        }

        /* Right section */
        .right-panel {
            width: 50%;
            padding: 40px 30px 25px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            font-size: 22px;
            font-weight: 600;
            color: #1a73e8;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: .5px;
        }

        /* Material input */
        .material-input {
            position: relative;
            margin: 20px 0;
        }

        .material-input input {
            width: 100%;
            padding: 12px 12px 12px 44px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #d2d2d2;
            outline: none;
            transition: .2s;
            background: #fafafa;
        }

        .material-input input:focus {
            border-color: #1a73e8;
            background: white;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.25);
        }

        .material-input i {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 22px;
            color: #5f6368;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 14px 0;
            margin-top: 25px;
            background: #1a73e8;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(26, 115, 232, 0.25);
            transition: .2s;
        }

        .login-btn:hover {
            background: #155fc2;
        }

        /* Credit */
        .credit {
            text-align: center;
            font-size: 14px;
            color: #444;
            margin-top: 18px;
            width: 100%;
        }

        .credit a {
            color: #1a73e8;
            font-weight: 500;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 780px) {
            .login-card {
                width: 90%;
                flex-direction: column;
            }

            .left-panel, .right-panel {
                width: 100%;
            }
        }
    </style>

</head>


<body>

<div class="login-card">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <img src="{% static 'sw/images/icon-192.png' %}" alt="Logo">
        <div class="title">SCHOOLS-STACK</div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <form id="userLoginForm" action="{% url 'homeApp:post_login' %}" method="post">
            {% csrf_token %}

            <div class="login-header">LOGIN</div>

            <div class="material-input">
                <i class="material-icons">person</i>
                <input type="text" id="userName" name="userName" placeholder="Username">
            </div>

            <div class="material-input">
                <i class="material-icons">lock</i>
                <input type="password" id="password" name="password" placeholder="Password">
            </div>

            <button class="login-btn" type="button" onclick="UserLogin()">CONTINUE</button>
        </form>
    </div>

</div>

<p class="credit">
    Developed by <a href="http://zivainfotech.com" target="_blank">Ziva Infotech</a>
</p>

<!-- JS Login Logic (unchanged) -->
<script>
    function UserLogin() {
        var username = $('#userName').val();
        var password = $('#password').val();

        if (username === "" || password === "") {
            $('body').toast({
                class: 'error',
                message: 'Username and Password is required !'
            });
        } else {
            let data = new FormData();
            data.append("userName", username);
            data.append("password", password);

            $.ajax({
                type: "POST",
                url: "{% url 'homeApp:post_login' %}",
                data: data,
                contentType: false,
                processData: false,

                success: function (response) {
                    if (response.message === "success") {
                        $('body').toast({
                            class: 'success',
                            message: 'Login Successful.'
                        });
                        sessionStorage.setItem('pwaInstallPromptAfterLogin', '1');
                        document.location.href = response.data;
                    } else {
                        $('body').toast({
                            class: 'warning',
                            message: 'Incorrect username or password.'
                        });
                    }
                },

                error: function () {
                    $('body').toast({
                        class: 'error',
                        message: 'An error occurred!'
                    });
                }
            });
        }
    }
</script>

</body>
</html>
