{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="icon" href="{% static 'sw/images/favicon.ico' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fomantic-ui/2.8.8/semantic.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e3eafd, #e8f5e9); font-family: Arial, sans-serif; }
        .reset-card { width: min(92vw, 430px); background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 12px 34px rgba(20, 48, 90, .16); }
        .reset-card h1 { font-size: 24px; color: #1a73e8; margin: 0 0 10px; }
        .reset-card p { color: #5f6368; margin: 0 0 22px; line-height: 1.45; }
        .field-wrap { position: relative; margin-bottom: 20px; }
        .field-wrap i { position: absolute; top: 12px; left: 12px; color: #5f6368; }
        .field-wrap input { width: 100%; box-sizing: border-box; padding: 13px 12px 13px 44px; border: 1px solid #d5dae2; border-radius: 8px; font-size: 15px; }
        .primary-btn { width: 100%; border: 0; border-radius: 8px; background: #1a73e8; color: #fff; padding: 13px; font-weight: 700; cursor: pointer; }
        .back-link { display: inline-block; margin-top: 18px; color: #1a73e8; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <form class="reset-card" method="post" action="{% url 'homeApp:send_password_reset_link' %}">
        {% csrf_token %}
        <h1>Forgot password</h1>
        <p>Enter your username. If an email is linked with the account, we will send a password reset link.</p>
        <div class="field-wrap">
            <i class="material-icons">person</i>
            <input type="text" name="userName" placeholder="Username" autocomplete="username" required>
        </div>
        <button class="primary-btn" type="submit">Send Reset Link</button>
        <a class="back-link" href="{% url 'homeApp:login_page' %}">Back to login</a>
    </form>
</body>
</html>
